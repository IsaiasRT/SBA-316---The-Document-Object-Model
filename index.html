<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Warcraft - The Official Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Game</a></li>
                <li><a href="#">News</a></li>
                <li><a href="#">Forums</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Support</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>World of Warcraft</h1>
            <p>Enter the World of Azeroth</p>

            <h2>Game Features</h2>
            <div class="feature-grid">
                <div class="feature-card">Races</div>

    </footer>

    <script src="script.js"></script>
